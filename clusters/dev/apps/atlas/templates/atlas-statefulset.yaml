apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: atlas
  namespace: utility
  labels:
    app.kubernetes.io/name: atlas
spec:
  serviceName: "atlas"
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: atlas
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atlas
    spec:
      imagePullSecrets:
        - name: docker-registry-secret
      containers:
        - name: atlas
          image: n47w5524.c1.de1.container-registry.ovh.net/hdc-services-external/apache-atlas:2.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 21000
              name: web-ui
          env:
            - name: LOG4J_FORMAT_MSG_NO_LOOKUPS
              value: "true"
            - name: MANAGE_LOCAL_HBASE
              value: "true"
            - name: MANAGE_LOCAL_SOLR
              value: "true"
          command: [ "/opt/apache-atlas-2.1.0/bin/atlas_start.py" ]
          volumeMounts:
            - name: atlas-storage
              mountPath: /opt/apache-atlas-2.1.0/data
              subPath: data
            - name: atlas-storage
              mountPath: /opt/apache-atlas-2.1.0/logs
              subPath: logs
      volumes:
        - name: atlas-storage
          persistentVolumeClaim:
            claimName: atlas-data
